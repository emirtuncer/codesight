name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ''
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ''
            cc: aarch64-linux-gnu-gcc
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ''
            cc: gcc
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            cc: gcc
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            cc: gcc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install cross-compiler (Linux arm64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go build \
            -ldflags "-s -w -X github.com/emirtuncer/codesight/internal/cli.Version=${VERSION}" \
            -o codesight-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/codesight/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codesight-${{ matrix.goos }}-${{ matrix.goarch }}
          path: codesight-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum codesight-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/codesight-*
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
